<svg xmlns="http://www.w3.org/2000/svg" viewBox="-14 -16 100 102" width="170" height="174" role="img" aria-label="b1t — o mascote cyber, animado">
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#00B2DF" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- flutuar (base, contínuo) -->
  <g>
    <animateTransform attributeName="transform" type="translate" dur="3s" repeatCount="indefinite"
      calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" values="0 0; 0 -2.5; 0 0"/>

    <!-- pular (bounce periódico) -->
    <g>
      <animateTransform attributeName="transform" type="translate" dur="5s" repeatCount="indefinite"
        keyTimes="0;0.5;0.6;0.7;0.78;0.86;1" values="0 0;0 0;0 -11;0 -2;0 -6;0 0;0 0"/>

      <!-- cambalear (tilt periódico, em torno do centro) -->
      <g>
        <animateTransform attributeName="transform" type="rotate" dur="6.5s" repeatCount="indefinite"
          keyTimes="0;0.12;0.2;0.28;0.36;0.44;1" values="0 36 40;0 36 40;-8 36 40;8 36 40;-5 36 40;0 36 40;0 36 40"/>

        <g filter="url(#glow)">
          <!-- antena: pulsa -->
          <line x1="36" y1="14" x2="36" y2="7" stroke="#2a2f36" stroke-width="2"/>
          <circle cx="36" cy="6" r="3" fill="#00B2DF">
            <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/>
            <animate attributeName="r" values="3;3.7;3" dur="1.6s" repeatCount="indefinite"/>
          </circle>

          <rect x="12" y="14" width="48" height="40" rx="13" fill="#12171d" stroke="#2a2f36" stroke-width="2"/>
          <rect x="18" y="22" width="36" height="18" rx="9" fill="#0a0d11" stroke="#00B2DF" stroke-opacity="0.35" stroke-width="1.5"/>

          <!-- olhos: piscam + olham em volta -->
          <g fill="#00B2DF">
            <animateTransform attributeName="transform" type="translate" dur="7s" repeatCount="indefinite"
              keyTimes="0;0.12;0.24;0.36;0.5;0.62;0.74;1" values="0 0;2 0;2 0;0 0;-2 0;-2 0;0 0;0 0"/>
            <animate attributeName="opacity" values="1;1;1;0;1;1;1;1;0;1;1"
              keyTimes="0;0.24;0.28;0.3;0.32;0.62;0.66;0.68;0.7;0.72;1" dur="4.4s" repeatCount="indefinite"/>
            <circle cx="29" cy="31" r="3.4"/>
            <circle cx="43" cy="31" r="3.4"/>
          </g>

          <!-- boca: sorri um pouco mais quando pula -->
          <path d="M30 45 q6 5 12 0" fill="none" stroke="#00B2DF" stroke-width="2" stroke-linecap="round">
            <animate attributeName="d" dur="5s" repeatCount="indefinite" keyTimes="0;0.55;0.7;0.85;1"
              values="M30 45 q6 5 12 0;M30 45 q6 5 12 0;M30 44 q6 7 12 0;M30 45 q6 5 12 0;M30 45 q6 5 12 0"/>
          </path>

          <!-- pés -->
          <rect x="22" y="56" width="9" height="6" rx="3" fill="#1a1f26" stroke="#2a2f36" stroke-width="1.5"/>
          <rect x="41" y="56" width="9" height="6" rx="3" fill="#1a1f26" stroke="#2a2f36" stroke-width="1.5"/>
        </g>
      </g>
    </g>
  </g>
</svg>
