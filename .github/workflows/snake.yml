name: Cobrinha de contribuições

on:
  schedule:
    - cron: "17 3 * * *" # 1x por dia
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Gera a cobrinha (teal)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#0DD1CA&color_dots=#0d1117,#0a5f5a,#0DD1CA,#5ff0ea,#aefaf6

      - name: Publica no branch output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
