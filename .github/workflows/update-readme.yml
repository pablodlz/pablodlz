name: Atualiza README (atividade + last login)

on:
  schedule:
    - cron: "23 */8 * * *" # a cada 8h
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Gera atividade recente + last login
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/atividade.py

      - name: Commit & push (se mudou)
        run: |
          if [[ -n "$(git status --porcelain README.md)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: atividade recente + last login [bot]"
            git push
          else
            echo "sem mudanças"
          fi
